spring:
  profiles:
    active: development
  # Security configuration
  #security:
  #  user:
  #    name: user
  #    password: user
  # Database
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/smartschool
    username: postgres
    password: password
  # JPA properties
  jpa:
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: update # When you launch the application for the first time - switch "none" at "create"
    show-sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    generate-ddl: true
